name: ops-status-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run ops status gate
        run: npm run ops:status:gate
